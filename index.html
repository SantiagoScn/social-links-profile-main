<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <main class="bg-neutral-900 flex flex-col items-center justify-center  min-h-screen text-white text-center">
    <article class="flex flex-col bg-neutral-800 rounded gap-3 p-6 max-w-sm w-full">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Avatar Image of Jessica Randall" class="rounded-full w-24 h-24 mx-auto">
      <h1 class="font-bold text-3xl">Jessica Randall</h1>
      <p class="text-lime-400">London, United Kingdom</p>
      <p class="text-sm">"Front-end developer and avid reader."</p>

      <a class="block bg-neutral-600 rounded p-2 hover:bg-neutral-500" href="https://github.com/jessicarandall" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a class="block bg-neutral-600 rounded p-2 hover:bg-neutral-500" href="http://" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>
      <a class="block bg-neutral-600 rounded p-2 hover:bg-neutral-500" href="http://" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="block bg-neutral-600 rounded p-2 hover:bg-neutral-500" href="http://" target="_blank" rel="noopener noreferrer">Twitter</a>
      <a class="block bg-neutral-600 rounded p-2 hover:bg-neutral-500" href="http://" target="_blank" rel="noopener noreferrer"> Instagram</a>
    </article>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
